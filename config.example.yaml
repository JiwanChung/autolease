# autolease configuration
# Copy to ~/.config/autolease/config.yaml
ssh_host: your-cluster
shell: bash              # remote shell (bash, fish, zsh)

# Default conda/micromamba env for jobs (optional)
# env: myenv
# env_activate: "micromamba run -n {env}"   # or "conda run -n {env}"

exclude_nodes: []

# QoS GPU limits per user (0 or omitted = unlimited)
# Only list QoS that have limits — unlisted ones default to unlimited.
# Partitions, GPU types, and allowed QoS are auto-discovered from the cluster.
qos:
  base_qos: 8       # guaranteed, non-preemptible
  # big_qos: 0      # unlimited, preemptible (default if omitted)
